version: "3.9"

services:

  redis:
    image: redis:7-alpine
    container_name: music-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory-policy allkeys-lru

  app:
    build: .
    container_name: music-app
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/workspace
      - ./data:/workspace/data

  insert:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/workspace
      - ./data:/workspace/data
    command: uv run python scripts/insert_songs.py
    profiles:
      - tools

  fingerprint:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/workspace
      - ./data:/workspace/data
    command: uv run python scripts/fingerprint_songs.py
    profiles:
      - tools

  evaluate:
    build: .
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/workspace
      - ./data:/workspace/data
    command: uv run python scripts/evaluate_system.py
    profiles:
      - tools

volumes:
  redis-data:
